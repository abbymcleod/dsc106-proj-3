<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Climate Scenarios</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js" defer></script>
    <script src="scenario-plot.js" defer></script>
    <script src="map-plot.js" defer></script>
  </head>
  <body>
    <nav>
      <a href="./index.html">Home</a>
    </nav>
    <h1>Seasonal Temperature Trends Under Climate Scenarios</h1>
    <p class="subtitle">
      MPI-ESM1-2-HR model — solid lines = summer (JJA), dashed = winter (DJF)
    </p>

    <div id="controls">
      <div class="control-group">
        <label class="group-label">Cities</label>
        <div class="btn-group" id="city-btns"></div>
      </div>
      <div class="control-group">
        <label class="group-label">Scenarios</label>
        <div class="btn-group" id="scenario-btns"></div>
      </div>
      <div id="scale-toggle">
        <input type="checkbox" id="normalize-cb" />
        <label for="normalize-cb">Per-city y-axis</label>
      </div>
    </div>

    <div class="legend" id="legend"></div>
    <div id="chart-area"></div>
  </body>
</html>
